services:
  - type: web
    name: b2f-hub
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 app:app
    envVars:
      # --- Timesheet (invariate) ---
      - key: XS_USER
        sync: false
      - key: XS_PASS
        sync: false
      # --- Hub (invariate) ---
      - key: APP_PIN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      # --- Supabase (nuove) ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
